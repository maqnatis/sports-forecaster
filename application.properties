# ============================================================
#  Outdoor Sports Agent – Application Properties
#  Place your API key in the OPENAI_API_KEY environment variable
#  (never hard-code secrets in this file).
# ============================================================

# ── Spring Application ──────────────────────────────────────
spring.application.name=outdoor-sports-agent

# ── OpenAI (read from env variable OPENAI_API_KEY) ──────────
# Spring AI will automatically pick up the env variable.
# You may override the model here if needed.
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.3

# ── Embabel Core ────────────────────────────────────────────
# Default LLM identifier that Embabel will use for @Action methods
embabel.models.default-llm=gpt-4o-mini

# Logging verbosity for plan formulation and LLM calls (set to DEBUG for dev)
embabel.logging.log-prompts=false
embabel.logging.log-responses=false

# ── Open-Meteo Weather API (free, no key required) ──────────
# Base URL for the free Open-Meteo forecast API
weather.api.base-url=https://api.open-meteo.com/v1/forecast

# ── Spring Shell ─────────────────────────────────────────────
# Disable the Spring Shell banner for a cleaner startup
spring.shell.interactive.enabled=true
spring.shell.command.quit.enabled=true

# ── Logging ──────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.outdoorsports=INFO
logging.level.com.embabel=INFO
# Uncomment for verbose Embabel internals during debugging:
# logging.level.com.embabel=DEBUG
